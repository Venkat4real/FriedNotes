name: Release Notes Cycle

on:
  pull_request:
    types: [closed]
    branches:
      - main
  schedule:
    - cron: '0 9 * * 2' # Every Tuesday at 9:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-notes:
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            node .github/scripts/update-release-notes.js pr
          else
            node .github/scripts/update-release-notes.js weekly
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/release_notes.md
          git commit -m "docs: auto-update release notes for ${{ github.event_name }} cycle" || echo "No changes to commit"
          git push origin main
