name: Weekly Release Notes

on:
  schedule:
    - cron: '0 9 * * 2' # Runs every Tuesday at 9:00 AM UTC
  workflow_dispatch: # Allows you to manually compile notes at any time

permissions:
  contents: write

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so GitHub can accurately trace the week's changes

      - name: Generate Release Notes From Git History
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            try {
              const response = await github.rest.repos.generateReleaseNotes({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `v${today}`,
                target_commitish: 'main'
              });
              core.setOutput('changelog', response.data.body);
            } catch (error) {
              core.setFailed(`Failed to generate release notes: ${error.message}`);
            }

      - name: Update Release Notes File
        run: |
          # Creates a heading and prepends the new updates to the top of your existing release-notes.md
          echo -e "# Release Notes - $(date +'%Y-%m-%d')\n\n${{ steps.release_notes.outputs.changelog }}\n\n$(cat docs/release-notes.md 2>/dev/null || true)" > docs/release-notes.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add docs/release-notes.md
          git commit -m "docs: auto-update release notes for weekly cycle" || echo "No changes to commit"
          git push origin main
