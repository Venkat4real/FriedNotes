openapi: 3.0.0
info:
  title: Books
  description: >
    # Books API Overview


    The **Books** API provides endpoints to manage and retrieve information
    about books and related resources. This collection demonstrates typical
    CRUD-style operations such as listing books, retrieving a single book by
    identifier, and potentially creating, updating, or deleting book records
    depending on the available requests.


    Use this collection to:

    - Explore how to fetch book data.

    - Understand typical request and response shapes for a simple JSON-based
    API.

    - Experiment with query and path parameters for resource filtering.


    ## Authentication


    If any authentication is configured for this collection or its requests, it
    is set in the **Authorization** tab at the collection or request level and
    inherited by individual requests as needed. If no auth is configured, the
    API is assumed to be publicly accessible for demo purposes.


    ## Using this collection


    1. Review the description on each request for details about its purpose,
    parameters, and response codes.

    2. Use any saved examples to understand the typical response bodies.

    3. Run requests directly or via the Collection Runner to test flows end to
    end.


    Each request in this collection includes:

    - A short summary of what the endpoint does.

    - HTTP method and path.

    - Parameters (path/query) with types and examples where relevant.

    - Required headers.

    - Request body schema or examples (for methods that send a body).

    - Key response codes and expected behavior.
  version: 1.0.0
servers:
  - url: undefined://{{baseUrl}}
  - url: undefined://{{baseURL}}
paths:
  /status:
    get:
      tags:
        - General
      summary: API Status
      description: >-
        ## Description


        Retrieves the current operational status of the Books API. Use this
        endpoint to verify server availability before performing CRUD
        operations.
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /books:
    get:
      tags:
        - General
      summary: Get list of all books
      description: >-
        ## Description


        Returns a list of all available books in the library catalog


        ## Response attributes


        | Field | Type | Description |

        | --- | --- | --- |

        | `id` | integer | **Required.** Unique identifier for the book. |

        | `name` | string | **Required.** The full title of the book. |

        | `type` | string | **Required.** The genre/category (e.g., fiction,
        non-fiction). |

        | `available` | boolean | Indicates if the book is currently in stock. |
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: >-
            Filters the results by limit. The maximum number of books to return
            in the response. Default is 10.
          example: '2'
        - name: type
          in: query
          schema:
            type: string
          description: >-
            Filters the results by genre. Supported values: fiction,
            non-fiction.
          example: fiction
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /books/:bookId:
    get:
      tags:
        - General
      summary: Get details of single book
      description: >-
        ## Description


        Returns detailed information for a specific book using its unique ID.
        This includes the title, author, genre, and current stock availability.
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
